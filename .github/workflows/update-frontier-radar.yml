name: Update Frontier Radar

on:
  schedule:
    - cron: "17 1 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: frontier-radar
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update README frontier radar
        run: python scripts/update_frontier_radar.py

      - name: Commit changes
        run: |
          if git diff --quiet README.md; then
            echo "No README changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update frontier radar"
          git push
